name: Kuma Control
options:
  bundleIdPrefix: com.molinesdesigns
  deploymentTarget:
    macOS: "14.0"
    watchOS: "11.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Release
  knownRegions: [en, es]
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: GD6M44DYPQ
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

configs:
  Debug: debug
  Release: release

targets:
  KumaControl:
    type: application
    platform: macOS
    sources:
      - path: KumaControl
      - path: KumaControlShared
      - path: KumaControlIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control
        PRODUCT_NAME: Kuma Control
        PRODUCT_MODULE_NAME: KumaControl
        INFOPLIST_FILE: KumaControl/Info.plist
        CODE_SIGN_ENTITLEMENTS: KumaControl/Entitlements/KumaControl.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: KumaControl/Info.plist
      properties:
        CFBundleDisplayName: Kuma Control
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: KumaControl/Entitlements/KumaControl.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-control
    dependencies:
      - target: KumaControlWidget
        embed: true
        codeSign: true
        copy:
          destination: plugins
    scheme:
      testTargets:
        - KumaControlTests
        - KumaControlUITests

  KumaControlWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: KumaControlWidget
      - path: KumaControlShared
      - path: KumaControl/Resources/Assets.xcassets
      - path: KumaControl/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control.widget
        PRODUCT_NAME: KumaControlWidget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: KumaControlWidget/KumaControlWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-control

  KumaControlWatch:
    type: application
    platform: watchOS
    sources:
      - path: KumaControlWatch
      - path: KumaControlShared
      - path: KumaControl/Resources/Localizable.xcstrings
      - path: KumaControlWatch/Resources/Assets.xcassets
      - path: KumaControl/Models/Domain/HeartbeatRepresentable.swift
      - path: KumaControl/Models/Domain/MonitorGroupRepresentable.swift
      - path: KumaControl/Models/Domain/MonitorRepresentable.swift
      - path: KumaControl/Models/Domain/MonitorStatus.swift
      - path: KumaControl/Models/Domain/ServerConnection.swift
      - path: KumaControl/Models/UptimeKuma
      - path: KumaControl/Services/Monitoring
      - path: KumaControl/Services/Networking/APIError.swift
      - path: KumaControl/Services/Networking/HTTPClient.swift
      - path: KumaControl/Services/UptimeKuma
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control.watch
        PRODUCT_NAME: KumaControlWatch
        PRODUCT_MODULE_NAME: KumaControlWatch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_WKWatchOnly: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        INFOPLIST_FILE: KumaControlWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: KumaControlWatch/KumaControlWatch.entitlements
    info:
      path: KumaControlWatch/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKWatchOnly: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: KumaControlWatch/KumaControlWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-control
    dependencies:
      - target: KumaControlWatchWidget
        embed: true
        codeSign: true
        copy:
          destination: plugins

  KumaControlWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: KumaControlWatchWidget
      - path: KumaControlShared
      - path: KumaControlWatch/Resources/Assets.xcassets
      - path: KumaControl/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control.watch.widget
        PRODUCT_NAME: KumaControlWatchWidget
        PRODUCT_MODULE_NAME: KumaControlWatchWidget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: KumaControlWatchWidget/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: KumaControlWatchWidget/KumaControlWatchWidget.entitlements
    entitlements:
      path: KumaControlWatchWidget/KumaControlWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-control

  KumaControlTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KumaControlTests
    dependencies:
      - target: KumaControl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kuma Control.app/Contents/MacOS/Kuma Control"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  KumaControlUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: KumaControlUITests
    dependencies:
      - target: KumaControl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-control.uitests
        GENERATE_INFOPLIST_FILE: YES
