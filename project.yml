name: Kuma NotiBar
options:
  bundleIdPrefix: com.molinesdesigns
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: GD6M44DYPQ
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

configs:
  Debug: debug
  Release: release

targets:
  KumaNotiBar:
    type: application
    platform: macOS
    sources:
      - path: KumaNotiBar
      - path: KumaNotiBarShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notibar
        PRODUCT_NAME: Kuma NotiBar
        INFOPLIST_FILE: KumaNotiBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: KumaNotiBar/Entitlements/KumaNotiBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: KumaNotiBar/Info.plist
      properties:
        CFBundleDisplayName: Kuma NotiBar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: KumaNotiBar/Entitlements/KumaNotiBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-notibar
    scheme:
      testTargets:
        - KumaNotiBarTests

  KumaNotiBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KumaNotiBarTests
    dependencies:
      - target: KumaNotiBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notibar.tests
