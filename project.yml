name: Kuma Notify
options:
  bundleIdPrefix: com.molinesdesigns
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Release
  knownRegions: [en, es]
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: GD6M44DYPQ
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

configs:
  Debug: debug
  Release: release

targets:
  KumaNotify:
    type: application
    platform: macOS
    sources:
      - path: KumaNotify
      - path: KumaNotifyShared
      - path: KumaNotifyIntents
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notify
        PRODUCT_NAME: Kuma Notify
        PRODUCT_MODULE_NAME: KumaNotify
        INFOPLIST_FILE: KumaNotify/Info.plist
        CODE_SIGN_ENTITLEMENTS: KumaNotify/Entitlements/KumaNotify.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: KumaNotify/Info.plist
      properties:
        CFBundleDisplayName: Kuma Notify
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: KumaNotify/Entitlements/KumaNotify.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-notify
    dependencies:
      - target: KumaNotifyWidget
        embed: true
        codeSign: true
        copy:
          destination: plugins
    scheme:
      testTargets:
        - KumaNotifyTests
        - KumaNotifyUITests

  KumaNotifyWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: KumaNotifyWidget
      - path: KumaNotifyShared
      - path: KumaNotify/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notify.widget
        PRODUCT_NAME: KumaNotifyWidget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: KumaNotifyWidget/KumaNotifyWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.molinesdesigns.kuma-notify

  KumaNotifyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KumaNotifyTests
    dependencies:
      - target: KumaNotify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notify.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kuma Notify.app/Contents/MacOS/Kuma Notify"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

  KumaNotifyUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: KumaNotifyUITests
    dependencies:
      - target: KumaNotify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.molinesdesigns.kuma-notify.uitests
        GENERATE_INFOPLIST_FILE: YES
